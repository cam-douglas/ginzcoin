name: Web

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_GINZ_ADDRESS: "0x0000000000000000000000000000000000000001"
      NEXT_PUBLIC_CHAIN_ID: "84532"
      NEXT_PUBLIC_WC_PROJECT_ID: "ci-placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
